services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gatum-ai-agent
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      DATABASE_PATH: /app/data/tickets.db
      KNOWLEDGE_DIR: /app/knowledge/faq
      PYTHONUNBUFFERED: "1"
    volumes:
      # Persist tickets between restarts
      - ./data:/app/data
      - ./knowledge:/app/knowledge
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
